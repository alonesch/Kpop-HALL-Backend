name: Discord Commit Notify

on:
  push:

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Send commit to Discord
        run: |
          jq -n \
            --arg repo "${{ github.repository }}" \
            --arg branch "${{ github.ref_name }}" \
            --arg author "${{ github.actor }}" \
            --arg message "${{ github.event.commits[0].message }}" \
            --arg url "https://github.com/${{ github.repository }}/commit/${{ github.sha }}" \
            '{
              content: "🚀 Novo commit\n\n📦 Repo: \($repo)\n🌿 Branch: \($branch)\n👤 Autor: \($author)\n📝 Mensagem: \($message)\n🔗 Commit: \($url)"
            }' \
          | curl -H "Content-Type: application/json" \
                 -d @- \
                 ${{ secrets.DISCORD_WEBHOOK }}
name: Discord PR Notify

on:
  pull_request:
    types: [opened, closed, reopened, ready_for_review, review_requested]

jobs:
  notify:
    runs-on: ubuntu-latest
    if: ${{ !(github.event.action == 'opened' && github.event.pull_request.draft) }}

    steps:
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Send PR event to Discord
        env:
          ACTION: ${{ github.event.action }}
          MERGED: ${{ github.event.pull_request.merged }}
          REQUESTED_REVIEWER: ${{ github.event.requested_reviewer.login }}
        run: |
          # Define o título da notificação com base no evento
          case "$ACTION" in
            opened)           HEADER="🟦 Novo Pull Request" ;;
            reopened)         HEADER="🟪 Pull Request reaberto" ;;
            ready_for_review) HEADER="🟨 Pull Request pronto para review" ;;
            review_requested) HEADER="🟧 Review solicitado para @${REQUESTED_REVIEWER}" ;;
            closed)
              if [ "$MERGED" = "true" ]; then
                HEADER="🟩 Pull Request mergeado"
              else
                HEADER="🟥 Pull Request fechado sem merge"
              fi
              ;;
            *) HEADER="ℹ️ Evento de PR: $ACTION" ;;
          esac

          jq -n \
            --arg header "$HEADER" \
            --arg repo "${{ github.repository }}" \
            --arg number "${{ github.event.pull_request.number }}" \
            --arg title "${{ github.event.pull_request.title }}" \
            --arg author "${{ github.event.pull_request.user.login }}" \
            --arg head "${{ github.event.pull_request.head.ref }}" \
            --arg base "${{ github.event.pull_request.base.ref }}" \
            --arg url "${{ github.event.pull_request.html_url }}" \
            '{
              content: "\($header)\n\n📦 Repo: \($repo)\n🔢 PR: #\($number)\n📝 Título: \($title)\n👤 Autor: \($author)\n🌿 Branch: \($head) → \($base)\n🔗 Link: \($url)"
            }' \
          | curl -H "Content-Type: application/json" \
                 -d @- \
                 ${{ secrets.DISCORD_WEBHOOK_PRS }}